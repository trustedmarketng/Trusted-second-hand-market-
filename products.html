<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Trusted Market NG</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#0a8f3d;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
}

button{
    width:100%;
    background:#0a8f3d;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>Trusted Market NG</h1>
<h3>Products</h3>
</header>

<div class="container">

<div class="card">
<h2>Samsung Galaxy S23</h2>
<p>Condition: Fairly Used</p>
<p class="price">₦450,000</p>
<button>View Details</button>
</div>

<div class="card">
<h2>HP EliteBook</h2>
<p>Condition: Brand New</p>
<p class="price">₦620,000</p>
<button>View Details</button>
</div>

<div class="card">
<h2>Toyota Corolla</h2>
<p>Condition: Fairly Used</p>
<p class="price">₦8,500,000</p>
<button>View Details</button>
</div>

</div>

</body>
</html>
